<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Aquarium</title>
    <style>
        :root {
            --bg-color: #060a13;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --font-sans: 'Helvetica Neue', Arial, sans-serif;
            --font-serif: 'Didot', 'Bodoni MT', 'Cinzel', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            padding: 2rem;
            position: relative;
            cursor: pointer;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 25%, rgba(127, 255, 212, 0.35) 0%, transparent 45%),  
                radial-gradient(circle at 75% 30%, rgba(6, 26, 64, 0.9) 0%, transparent 55%),       
                radial-gradient(circle at 40% 70%, rgba(0, 255, 255, 0.25) 0%, transparent 50%),    
                radial-gradient(circle at 80% 75%, rgba(75, 0, 130, 0.4) 0%, transparent 45%),      
                radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.18) 0%, transparent 35%),  
                linear-gradient(135deg, #040814 0%, #0a192f 100%);
            background-size: 200% 200%;
            z-index: -3;
            filter: blur(55px);
            animation: tropicalOceanFlow 25s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.03) 40%, rgba(127, 255, 212, 0.04) 50%, transparent 60%);
            background-size: 300% 300%;
            z-index: -3;
            filter: blur(20px);
            animation: silkSheen 18s ease-in-out infinite;
            pointer-events: none;
        }

        .fish-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #fishCanvasBack { z-index: -1; opacity: 0.65; }
        #fishCanvasFront { z-index: 20; opacity: 0.95; }

        header, footer {
            z-index: 30;
            user-select: none;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .hud-hidden header, 
        .hud-hidden footer {
            opacity: 0;
        }

        header:hover, footer:hover {
            opacity: 1 !important;
        }

        header {
            text-align: center;
            margin-top: 1.5rem;
        }

        header h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 0.4rem;
            text-shadow: 0 4px 12px rgba(4, 8, 20, 0.5);
        }

        header p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(4, 8, 20, 0.3);
        }

        footer {
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #4b5563;
        }

        @keyframes tropicalOceanFlow {
            0% { background-position: 0% 30%; transform: scale(1) rotate(0deg); }
            50% { background-position: 100% 70%; transform: scale(1.05) rotate(2deg); }
            100% { background-position: 30% 100%; transform: scale(1) rotate(-1deg); }
        }

        @keyframes silkSheen {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
    </style></head><body>

    <canvas id="fishCanvasBack" class="fish-layer"></canvas>
    <canvas id="fishCanvasFront" class="fish-layer"></canvas>

    <header>
        <h1>Digital Aquarium</h1>
        <p>Click anywhere to toggle borderless fullscreen</p>
    </header>

    <footer>
        &copy; <span id="currentYear"></span> patjones.org. All rights reserved.
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        const canvasBack = document.getElementById('fishCanvasBack');
        const ctxBack = canvasBack.getContext('2d');
        const canvasFront = document.getElementById('fishCanvasFront');
        const ctxFront = canvasFront.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resizeCanvases() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvasBack.width = canvasFront.width = width;
            canvasBack.height = canvasFront.height = height;
        }
        window.addEventListener('resize', resizeCanvases);

        // --- HUD Visiblity Handling ---
        let hudTimeout;
        function showHUD() {
            document.body.classList.remove('hud-hidden');
            clearTimeout(hudTimeout);
            hudTimeout = setTimeout(() => {
                document.body.classList.add('hud-hidden');
            }, 3000);
        }
        window.addEventListener('mousemove', showHUD);
        window.addEventListener('touchstart', showHUD);
        showHUD();

        // --- Fullscreen Utility ---
        window.addEventListener('click', (e) => {
            if (e.target.closest('header') || e.target.closest('footer')) return;

            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        });

        // --- Chakra Data Configurations ---
        const CHAKRAS = [
            { name: "Root",         color: "#FF2A2A", glow: "rgba(255, 42, 42, 0.5)" },
            { name: "Sacral",       color: "#FF7F2A", glow: "rgba(255, 127, 42, 0.5)" },
            { name: "Solar Plexus", color: "#FFD42A", glow: "rgba(255, 212, 42, 0.5)" },
            { name: "Heart",        color: "#2AFF7F", glow: "rgba(42, 255, 127, 0.5)" },
            { name: "Throat",       color: "#2AD4FF", glow: "rgba(42, 212, 255, 0.5)" },
            { name: "Third Eye",    color: "#662AFF", glow: "rgba(102, 42, 255, 0.5)" },
            { name: "Crown",        color: "#D42AFF", glow: "rgba(212, 42, 255, 0.5)" }
        ];

        const INITIAL_FISH_PER_CHAKRA = 4;
        const MAX_FISH = 120;

        // --- Environmental Particles (Bubbles) ---
        class Bubble {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // initial scatter
            }
            reset() {
                this.x = Math.random() * width;
                this.y = height + 20;
                this.size = Math.random() * 2.5 + 0.5;
                this.speed = Math.random() * 1.2 + 0.4;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.wobblePhase = Math.random() * Math.PI * 2;
                this.wobbleAmp = Math.random() * 1.5;
            }
            update() {
                this.y -= this.speed;
                this.wobblePhase += this.wobbleSpeed;
                this.x += Math.sin(this.wobblePhase) * 0.2;
                if (this.y < -20) this.reset();
            }
            draw(ctx) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- Fish Boids Instance Class ---
        class Fish {
            constructor(spawnOnEdges = false, chakraData = null) {
                this.isForeground = Math.random() > 0.45;
                this.chakra = chakraData || CHAKRAS[Math.floor(Math.random() * CHAKRAS.length)];

                if (spawnOnEdges) {
                    this.x = Math.random() > 0.5 ? -50 : width + 50;
                    this.y = Math.random() * height;
                } else {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                }
                
                // Controlled base velocity direction vectors
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1 + 0.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.baseSize = this.isForeground ? (Math.random() * 3 + 6) : (Math.random() * 2 + 3.5); 
                this.size = this.baseSize;
                this.maxSpeed = this.isForeground ? (Math.random() * 1.0 + 1.6) : (Math.random() * 0.7 + 1.0);
                this.maxForce = 0.025;
                
                this.tailWagSpeed = Math.random() * 0.08 + 0.14;
                this.tailWagPhase = Math.random() * Math.PI * 2;
            }

            update() {
                this.tailWagPhase += this.tailWagSpeed;

                let speed = Math.hypot(this.vx, this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Seamless Screen wrapping
                const buffer = 60;
                if (this.x < -buffer) this.x = width + buffer;
                else if (this.x > width + buffer) this.x = -buffer;
                if (this.y < -buffer) this.y = height + buffer;
                else if (this.y > height + buffer) this.y = -buffer;
            }

            // Spatial Grid Accelerated Flocking Calculations
            flock(neighbors) {
                let sepX = 0, sepY = 0, aliX = 0, aliY = 0, cohX = 0, cohY = 0;
                let sepCount = 0, matchCount = 0;

                const perceiveRadiusSq = 8100; // 90^2
                const separationRadiusSq = 1024; // 32^2

                for (let i = 0; i < neighbors.length; i++) {
                    let other = neighbors[i];
                    if (other === this || other.isForeground !== this.isForeground) continue;

                    let dx = other.x - this.x;
                    let dy = other.y - this.y;
                    let distSq = dx * dx + dy * dy;

                    if (distSq < perceiveRadiusSq && distSq > 0) {
                        let affinity = (other.chakra.name === this.chakra.name) ? 1.6 : 1.0;

                        aliX += other.vx * affinity;
                        aliY += other.vy * affinity;
                        cohX += other.x * affinity;
                        cohY += other.y * affinity;
                        matchCount++;

                        if (distSq < separationRadiusSq) {
                            let dist = Math.sqrt(distSq);
                            sepX -= dx / dist;
                            sepY -= dy / dist;
                            sepCount++;
                        }
                    }
                }

                if (matchCount > 0) {
                    aliX /= matchCount; aliY /= matchCount;
                    let aliSpeed = Math.hypot(aliX, aliY);
                    if (aliSpeed > 0) {
                        aliX = (aliX / aliSpeed) * this.maxSpeed - this.vx;
                        aliY = (aliY / aliSpeed) * this.maxSpeed - this.vy;
                    }
                    cohX /= matchCount; cohY /= matchCount;
                    cohX -= this.x; cohY -= this.y;
                    let cohSpeed = Math.hypot(cohX, cohY);
                    if (cohSpeed > 0) {
                        cohX = (cohX / cohSpeed) * this.maxSpeed - this.vx;
                        cohY = (cohY / cohSpeed) * this.maxSpeed - this.vy;
                    }
                    this.vx += (aliX * this.maxForce) + (cohX * this.maxForce * 0.35);
                    this.vy += (aliY * this.maxForce) + (cohY * this.maxForce * 0.35);
                }

                if (sepCount > 0) {
                    this.vx += sepX * this.maxForce * 2.2;
                    this.vy += sepY * this.maxForce * 2.2;
                }
            }

            draw(ctx) {
                let angle = Math.atan2(this.vy, this.vx);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);

                let gradient = ctx.createLinearGradient(-this.size, 0, this.size * 1.5, 0);
                gradient.addColorStop(0, 'rgba(255,255,255,0.2)');
                gradient.addColorStop(0.35, this.chakra.color);
                gradient.addColorStop(1, '#ffffff');

                ctx.shadowBlur = this.isForeground ? 18 : 6;
                ctx.shadowColor = this.chakra.glow;

                ctx.fillStyle = gradient;
                
                // Structural Draw Paths for fluid fish body + dynamic oscillating tail
                ctx.beginPath();
                let tailWag = Math.sin(this.tailWagPhase) * (this.size * 0.55);
                
                ctx.moveTo(this.size * 1.8, 0); 
                ctx.quadraticCurveTo(this.size * 0.4, -this.size * 0.6, -this.size * 0.4, tailWag * 0.3); 
                ctx.lineTo(-this.size * 1.3, tailWag); // Fin extension tail line
                
                // Dynamic back-fin flares
                ctx.lineTo(-this.size * 1.6, tailWag + (this.size * 0.45));
                ctx.lineTo(-this.size * 1.4, tailWag);
                ctx.lineTo(-this.size * 1.6, tailWag - (this.size * 0.45));
                
                ctx.lineTo(-this.size * 1.3, tailWag);
                ctx.quadraticCurveTo(this.size * 0.4, this.size * 0.6, this.size * 1.8, 0); 
                
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // --- Init Environments & Systems Array ---
        let school = [];
        const bubbles = Array.from({ length: 45 }, () => new Bubble());

        function initSchool() {
            school = [];
            for (let c = 0; c < CHAKRAS.length; c++) {
                for (let i = 0; i < INITIAL_FISH_PER_CHAKRA; i++) {
                    school.push(new Fish(false, CHAKRAS[c]));
                }
            }
        }

        resizeCanvases();
        initSchool();

        // Incrementally add natural background additions
        setInterval(() => {
            if (school.length < MAX_FISH) {
                school.push(new Fish(true));
            }
        }, 2500);

        // --- Core Animation Loop ---
        function animate() {
            ctxBack.clearRect(0, 0, width, height);
            ctxFront.clearRect(0, 0, width, height);

            // Update & Render Ambient Environment Layers first
            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw(ctxBack);
            });

            // Spatial Grid Partitioning System Setup ($O(N)$ space/time generation)
            const cellSize = 100;
            const grid = {};
            
            for (let i = 0; i < school.length; i++) {
                const fish = school[i];
                const cellX = Math.floor(fish.x / cellSize);
                const cellY = Math.floor(fish.y / cellSize);
                const key = `${cellX},${cellY}`;
                if (!grid[key]) grid[key] = [];
                grid[key].push(fish);
            }

            // Perform flocking step updates via structural neighbors
            for (let i = 0; i < school.length; i++) {
                const fish = school[i];
                const cellX = Math.floor(fish.x / cellSize);
                const cellY = Math.floor(fish.y / cellSize);
                
                let neighbors = [];
                // Query local 3x3 grid blocks for active boids
                for (let xOffset = -1; xOffset <= 1; xOffset++) {
                    for (let yOffset = -1; yOffset <= 1; yOffset++) {
                        const key = `${cellX + xOffset},${cellY + yOffset}`;
                        if (grid[key]) {
                            neighbors.push(...grid[key]);
                        }
                    }
                }

                fish.flock(neighbors);
                fish.update();
                
                if (fish.isForeground) {
                    fish.draw(ctxFront);
                } else {
                    fish.draw(ctxBack);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script></body></html>
