
<style>
  #aq-wrap { position: relative; width: 100%; height: 580px; border-radius: var(--border-radius-lg); overflow: hidden; cursor: pointer; background: #060e1f; }
  #aq-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #aq-back { z-index: 1; opacity: 0.6; }
  #aq-front { z-index: 3; }
  .aq-bg { position: absolute; inset: 0; z-index: 0; background:
    radial-gradient(ellipse 70% 60% at 15% 20%, rgba(0,200,180,0.22) 0%, transparent 100%),
    radial-gradient(ellipse 60% 70% at 85% 80%, rgba(70,0,160,0.3) 0%, transparent 100%),
    radial-gradient(ellipse 80% 50% at 50% 50%, rgba(0,60,120,0.5) 0%, transparent 100%),
    linear-gradient(175deg, #040c1e 0%, #071730 60%, #030b1a 100%);
    animation: bgPulse 18s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.12); }
  }
  .aq-vignette { position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse 95% 90% at 50% 50%, transparent 55%, rgba(2,6,16,0.75) 100%);
  }
  .aq-hud { position: absolute; z-index: 5; pointer-events: none; transition: opacity 1s ease; }
  .aq-title { top: 20px; left: 0; right: 0; text-align: center; }
  .aq-title h2 { font-family: Georgia, serif; font-weight: 300; font-size: 22px; letter-spacing: 0.35em; color: rgba(255,255,255,0.8); text-transform: uppercase; margin: 0 0 4px; }
  .aq-title p { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(160,180,220,0.5); margin: 0; }
  .aq-footer { bottom: 12px; left: 0; right: 0; text-align: center; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(80,100,150,0.5); }
  .aq-stats { top: 20px; right: 20px; text-align: right; font-size: 11px; letter-spacing: 0.1em; color: rgba(120,160,220,0.55); }
  .aq-hud.hidden { opacity: 0; }
</style>

<div id="aq-wrap" aria-label="Digital Aquarium — animated fish simulation">
  <div class="aq-bg"></div>
  <canvas id="aq-back"></canvas>
  <canvas id="aq-front"></canvas>
  <div class="aq-vignette"></div>
  <div class="aq-hud aq-title" id="hud-title">
    <h2>Digital Aquarium</h2>
    <p>Click to fullscreen</p>
  </div>
  <div class="aq-hud aq-stats" id="hud-stats">
    <span id="fish-count">28</span> fish
  </div>
  <div class="aq-hud aq-footer" id="hud-footer">patjones.org</div>
</div>

<script>
(function() {
  const wrap = document.getElementById('aq-wrap');
  const cB = document.getElementById('aq-back');
  const cF = document.getElementById('aq-front');
  const xB = cB.getContext('2d');
  const xF = cF.getContext('2d');
  let W, H;

  function resize() {
    W = wrap.clientWidth; H = wrap.clientHeight;
    cB.width = cF.width = W;
    cB.height = cF.height = H;
  }
  resize();
  new ResizeObserver(resize).observe(wrap);

  const CHAKRAS = [
    { c: '#FF3A3A', g: 'rgba(255,58,58,0.5)' },
    { c: '#FF8C2A', g: 'rgba(255,140,42,0.5)' },
    { c: '#FFD832', g: 'rgba(255,216,50,0.5)' },
    { c: '#2AFF8C', g: 'rgba(42,255,140,0.5)' },
    { c: '#2ADCFF', g: 'rgba(42,220,255,0.5)' },
    { c: '#7B3FFF', g: 'rgba(123,63,255,0.5)' },
    { c: '#E030FF', g: 'rgba(224,48,255,0.5)' },
  ];

  const MAX_FISH = 110;
  const SPAWN_INTERVAL = 2800;
  const INIT_PER_CHAKRA = 4;

  function rnd(a, b) { return a + Math.random() * (b - a); }

  class Fish {
    constructor(edge, chakra) {
      this.fg = Math.random() > 0.45;
      this.chakra = chakra || CHAKRAS[Math.floor(Math.random() * CHAKRAS.length)];
      if (edge) {
        this.x = Math.random() > 0.5 ? -30 : W + 30;
        this.y = rnd(0, H);
      } else {
        this.x = rnd(0, W); this.y = rnd(0, H);
      }
      this.vx = rnd(-1, 1) || 0.5;
      this.vy = rnd(-0.6, 0.6);
      this.sz = this.fg ? rnd(5.5, 9) : rnd(3, 5.5);
      this.spd = this.fg ? rnd(1.6, 2.6) : rnd(0.9, 1.6);
      this.force = 0.028;
      this.wagSpd = rnd(0.12, 0.22);
      this.wagPhase = rnd(0, Math.PI * 2);
      this.wobble = 0;
      this.age = 0;
      this.opacity = 0;
    }

    update(school) {
      this.age++;
      if (this.opacity < 1) this.opacity = Math.min(1, this.opacity + 0.025);
      this.wagPhase += this.wagSpd;

      let sx=0,sy=0,ax=0,ay=0,cx=0,cy=0,sc=0,nc=0;
      const PR = 85, SR = 28;

      for (let i = 0; i < school.length; i++) {
        const o = school[i];
        if (o === this) continue;
        const dx = o.x - this.x, dy = o.y - this.y;
        const d2 = dx*dx + dy*dy;
        if (d2 > PR*PR) continue;
        const d = Math.sqrt(d2);
        const af = o.chakra === this.chakra ? 1.6 : 0.9;
        ax += o.vx * af; ay += o.vy * af;
        cx += o.x * af; cy += o.y * af;
        nc++;
        if (d < SR && d > 0) { sx -= dx/d; sy -= dy/d; sc++; }
      }

      if (nc > 0) {
        ax /= nc; ay /= nc;
        const al = Math.hypot(ax, ay);
        if (al > 0) { ax = ax/al * this.spd - this.vx; ay = ay/al * this.spd - this.vy; }
        cx /= nc; cy /= nc;
        cx -= this.x; cy -= this.y;
        const cl = Math.hypot(cx, cy);
        if (cl > 0) { cx = cx/cl * this.spd - this.vx; cy = cy/cl * this.spd - this.vy; }
        this.vx += ax * this.force + cx * this.force * 0.28;
        this.vy += ay * this.force + cy * this.force * 0.28;
      }
      if (sc > 0) { this.vx += sx * this.force * 1.9; this.vy += sy * this.force * 1.9; }

      const spd = Math.hypot(this.vx, this.vy);
      if (spd > this.spd) { this.vx = this.vx/spd * this.spd; this.vy = this.vy/spd * this.spd; }

      this.x += this.vx; this.y += this.vy;
      const buf = 45;
      if (this.x < -buf) this.x = W + buf;
      else if (this.x > W + buf) this.x = -buf;
      if (this.y < -buf) this.y = H + buf;
      else if (this.y > H + buf) this.y = -buf;
    }

    draw(ctx) {
      const ang = Math.atan2(this.vy, this.vx);
      const s = this.sz;
      const wag = Math.sin(this.wagPhase) * s * 0.52;
      const wag2 = Math.sin(this.wagPhase + 0.4) * 2.2;

      ctx.save();
      ctx.globalAlpha = this.opacity * (this.fg ? 0.92 : 0.62);
      ctx.translate(this.x, this.y);
      ctx.rotate(ang);

      ctx.shadowBlur = this.fg ? 18 : 7;
      ctx.shadowColor = this.chakra.g;

      const grad = ctx.createLinearGradient(-s * 0.4, 0, s * 1.9, 0);
      grad.addColorStop(0, 'rgba(255,255,255,0.12)');
      grad.addColorStop(0.35, this.chakra.c);
      grad.addColorStop(1, 'rgba(255,255,255,0.9)');
      ctx.fillStyle = grad;

      ctx.beginPath();
      ctx.moveTo(s * 1.85, 0);
      ctx.quadraticCurveTo(s * 0.2, -s * 0.58, -s * 0.9, wag);
      ctx.lineTo(-s * 1.5, wag + wag2);
      ctx.lineTo(-s * 1.5, wag - wag2);
      ctx.lineTo(-s * 0.9, wag);
      ctx.quadraticCurveTo(s * 0.2, s * 0.58, s * 1.85, 0);
      ctx.closePath();
      ctx.fill();

      if (this.fg && s > 6.5) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.ellipse(s * 0.85, -s * 0.18, s * 0.22, s * 0.14, -0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  }

  let school = [];
  function init() {
    school = [];
    for (let c = 0; c < CHAKRAS.length; c++)
      for (let i = 0; i < INIT_PER_CHAKRA; i++)
        school.push(new Fish(false, CHAKRAS[c]));
  }
  init();

  setInterval(() => {
    if (school.length < MAX_FISH) school.push(new Fish(true));
  }, SPAWN_INTERVAL);

  const countEl = document.getElementById('fish-count');
  let frame = 0;

  function loop() {
    xB.clearRect(0, 0, W, H);
    xF.clearRect(0, 0, W, H);
    for (let i = 0; i < school.length; i++) {
      const f = school[i];
      f.update(school);
      f.draw(f.fg ? xF : xB);
    }
    frame++;
    if (frame % 60 === 0) countEl.textContent = school.length;
    requestAnimationFrame(loop);
  }
  loop();

  let hudTimer;
  const huds = document.querySelectorAll('.aq-hud');
  function showHUD() {
    huds.forEach(h => h.classList.remove('hidden'));
    clearTimeout(hudTimer);
    hudTimer = setTimeout(() => huds.forEach(h => h.classList.add('hidden')), 3200);
  }
  wrap.addEventListener('mousemove', showHUD);
  wrap.addEventListener('touchstart', showHUD, { passive: true });
  showHUD();

  wrap.addEventListener('click', () => {
    if (!document.fullscreenElement) wrap.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
})();
</script>
